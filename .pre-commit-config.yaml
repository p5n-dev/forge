repos:
  # Universal file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks

  # Go formatting and imports
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: fb24a639f7c938759fe56eeebbb7713b69d60494 # v0.5.1
    hooks:
      - id: go-fmt
        args: ['-w']
      - id: go-imports
        args: ['-w']
      - id: go-build
        args: ['./...']
      - id: go-mod-tidy

  # Go linting
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --whole-files
        language: system
        pass_filenames: false
        types: [go]

  # Go tests with race detector
  - repo: local
    hooks:
      - id: go-test-short
        name: go test (short)
        entry: go test -short -race ./...
        language: system
        pass_filenames: false
        types: [go]
