name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Lint
        # golangci-lint-action v9 dropped support for golangci-lint v1.x;
        # the v1→v2 jump came with a config rewrite, but we have no
        # .golangci.yml so defaults apply unchanged. v2.11.4 picked for
        # the 14-day soak rule (released 2026-03-22).
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
