name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.64.5
